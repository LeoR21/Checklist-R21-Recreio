body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;position:relative;padding-bottom:70px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;background:#fff;border-bottom:1px solid #f0f0f0;}
.top-logo{width:38px;height:38px;background:#EA1D2C;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.top-logo i{color:#fff;font-size:20px;}
.top-title{font-size:17px;font-weight:600;color:#1a1a1a;}
.top-sub{font-size:12px;color:#888;margin-top:1px;}
.user-chip{display:flex;align-items:center;gap:7px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:24px;padding:5px 10px 5px 5px;}
.chip-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;}
.chip-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.chip-role{font-size:11px;color:#888;}
.chip-out{background:none;border:none;color:#aaa;cursor:pointer;padding:2px;margin-left:2px;font-size:17px;line-height:1;}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:12px;padding:8px 14px;margin:10px 16px 0;border-radius:24px;background:#fff3cd;color:#856404;border:1px solid #ffc107;}
.sync-bar.ok{background:#d1e7dd;color:#0f5132;border-color:#badbcc;}
.sync-bar.error{background:#f8d7da;color:#842029;border-color:#f5c2c7;}
.sync-bar i{font-size:14px;}
.prog-card{margin:12px 16px;background:#fff;border:1px solid #f0f0f0;border-radius:16px;padding:16px;}
.prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.prog-label{font-size:13px;color:#888;}
.prog-pct{font-size:24px;font-weight:700;color:#1a1a1a;}
.prog-track{height:8px;background:#f0f0f0;border-radius:8px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;background:#EA1D2C;border-radius:8px;transition:width 0.4s;}
.prog-fill.done{background:#1D9E75;}
.prog-status{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;}
.prog-status.ready{color:#1D9E75;}
.prog-status.pending{color:#EA1D2C;}
.prog-status i{font-size:16px;}
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:#fff;border-top:1px solid #f0f0f0;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;cursor:pointer;color:#aaa;font-size:11px;}
.nav-btn i{font-size:24px;}
.nav-btn.active{color:#EA1D2C;}
.nav-btn span{font-weight:500;}
.day-scroll{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.day-scroll::-webkit-scrollbar{display:none;}
.day-chip{display:flex;flex-direction:column;align-items:center;padding:8px 14px;border-radius:14px;border:1.5px solid #e8e8e8;background:#fff;color:#666;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;min-width:58px;}
.day-chip .day-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.day-chip .day-num{font-size:18px;font-weight:700;margin:2px 0;}
.day-chip .day-dot{width:6px;height:6px;border-radius:50%;background:#e8e8e8;margin-top:2px;}
.day-chip.active{background:#EA1D2C;color:#fff;border-color:#EA1D2C;}
.day-chip.active .day-dot{background:rgba(255,255,255,0.6);}
.day-chip.has-tasks .day-dot{background:#1D9E75;}
.day-chip.active.has-tasks .day-dot{background:#fff;}
.profile-scroll{display:flex;gap:8px;padding:4px 16px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.profile-scroll::-webkit-scrollbar{display:none;}
.prof-chip{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:24px;border:1.5px solid #e8e8e8;background:#fff;color:#666;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.prof-chip i{font-size:15px;}
.prof-chip.active{background:#EA1D2C;color:#fff;border-color:#EA1D2C;}
.section{padding:0 16px;margin-bottom:20px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;}
.sec-badge{font-size:12px;background:#f5f5f5;color:#888;padding:3px 10px;border-radius:10px;border:1px solid #e8e8e8;}
.task-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #f0f0f0;border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;}
.task-card:active{background:#fafafa;}
.task-card.checked{opacity:.55;}
.task-card.checked .task-text{text-decoration:line-through;color:#aaa;}
.check-box{width:28px;height:28px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.task-card.checked .check-box{background:#1D9E75;border-color:#1D9E75;}
.task-card.checked .check-box i{color:#fff;}
.check-box i{color:transparent;font-size:15px;}
.task-body{flex:1;min-width:0;}
.task-text{font-size:15px;color:#1a1a1a;line-height:1.4;}
.task-by{font-size:12px;color:#aaa;margin-top:3px;display:flex;align-items:center;gap:4px;}
.task-by i{font-size:13px;}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.tag{font-size:11px;padding:3px 9px;border-radius:10px;white-space:nowrap;font-weight:500;}
.tag-urgent{background:#FCEBEB;color:#A32D2D;}
.tag-config{background:#E6F1FB;color:#185FA5;}
.tag-op{background:#EAF3DE;color:#3B6D11;}
.tag-fin{background:#FAEEDA;color:#854F0B;}
.del-btn{background:none;border:none;color:#ccc;font-size:22px;cursor:pointer;padding:2px;line-height:1;}
.del-btn:active{color:#EA1D2C;}
.add-trigger{display:flex;align-items:center;gap:10px;padding:14px;border:1.5px dashed #ddd;border-radius:14px;color:#aaa;font-size:14px;cursor:pointer;background:none;width:100%;margin-top:4px;}
.add-trigger i{font-size:20px;}
.add-form{background:#f9f9f9;border:1px solid #e8e8e8;border-radius:14px;padding:14px;margin-top:4px;display:none;flex-direction:column;gap:10px;}
.add-form.open{display:flex;}
.add-input{width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;background:#fff;color:#1a1a1a;outline:none;}
.add-input:focus{border-color:#EA1D2C;}
.add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.add-select{flex:1;min-width:100px;padding:11px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;background:#fff;color:#1a1a1a;outline:none;}
.btn-add{padding:11px 18px;background:#EA1D2C;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-cancel{padding:11px 14px;background:#fff;border:1.5px solid #ddd;border-radius:10px;font-size:14px;color:#888;cursor:pointer;}
.reset-row{padding:0 16px 12px;}
.reset-btn{width:100%;padding:14px;background:#fff;border:1.5px solid #e8e8e8;border-radius:14px;font-size:14px;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:500;}
.reset-btn i{font-size:18px;}
.login-wrap{padding:40px 20px;}

.login-title{font-size:22px;font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:6px;}
.login-sub{font-size:14px;color:#888;text-align:center;margin-bottom:32px;}
.field{margin-bottom:14px;}
.field label{font-size:13px;color:#888;display:block;margin-bottom:6px;font-weight:500;}

.metric-val.red{color:#EA1D2C;}

.chart-title{font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;}

.legend-label{font-size:13px;color:#555;flex:1;}
.legend-val{font-size:13px;font-weight:700;color:#1a1a1a;}
.legend-pct{font-size:12px;color:#aaa;}

.bar-fill span{font-size:11px;font-weight:600;color:#fff;}
.bar-pct{font-size:12px;color:#888;width:34px;text-align:right;flex-shrink:0;}

.compare-row{display:flex;gap:10px;margin-bottom:10px;}
.compare-card{flex:1;background:#f9f9f9;border-radius:12px;padding:12px;text-align:center;}
.compare-label{font-size:11px;color:#aaa;margin-bottom:4px;}
.compare-val{font-size:22px;font-weight:700;color:#1a1a1a;}
.compare-sub{font-size:11px;color:#aaa;margin-top:2px;}
.compare-diff{display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:600;margin-top:8px;}
.compare-diff.up{color:#1D9E75;}
.compare-diff.down{color:#EA1D2C;}
.compare-diff.same{color:#888;}

.ps-icon i{font-size:18px;}
.ps-name{font-size:15px;font-weight:600;color:#1a1a1a;}

.badge-pend{background:#f8d7da;color:#842029;}
.badge-part{background:#fff3cd;color:#664d03;}

.ps-fill{height:100%;border-radius:6px;}
.ps-count{font-size:13px;color:#aaa;}
.ps-count span{color:#1a1a1a;font-weight:600;}
.act-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:#fff;border:1px solid #f0f0f0;border-radius:14px;margin-bottom:8px;}

.act-text{font-size:14px;color:#1a1a1a;}
.act-meta{font-size:12px;color:#aaa;margin-top:2px;}

.who-caixa{background:#FAEEDA;color:#854F0B;}
.who-expedicao{background:#EAF3DE;color:#3B6D11;}

.admin-pad{padding:0 16px 20px;}
.user-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #f0f0f0;border-radius:14px;padding:14px;margin-bottom:8px;}
.u-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.u-info{flex:1;}
.u-name{font-size:15px;font-weight:600;color:#1a1a1a;}
.u-sub{font-size:12px;color:#aaa;margin-top:2px;}
.u-role{font-size:12px;padding:3px 10px;border-radius:10px;font-weight:500;}
.r-dono{background:#EEEDFE;color:#3C3489;}
.r-gerente{background:#E6F1FB;color:#185FA5;}
.r-caixa{background:#FAEEDA;color:#854F0B;}
.r-expedicao{background:#EAF3DE;color:#3B6D11;}
.u-del{background:none;border:none;color:#ccc;font-size:22px;cursor:pointer;padding:4px;line-height:1;}
.new-user-form{background:#f9f9f9;border:1px solid #e8e8e8;border-radius:14px;padding:16px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#888;}
.spinner{width:36px;height:36px;border:3px solid #f0f0f0;border-top-color:#EA1D2C;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

function todayDayKey(){
  const d = new Date().getDay(); // 0=sun
  return ['dom','seg','ter','qua','qui','sex','sab'][d];
}
function todayDateKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function nt(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function td(){return new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});}

function setSyncBar(state,msg){
  const b=document.getElementById('sync-bar');
  if(!b)return;
  const ic={ok:'ti-cloud-check',loading:'ti-cloud',error:'ti-cloud-off'};
  b.className='sync-bar '+state;
  b.innerHTML=`<i class="ti ${ic[state]}"></i> ${msg}`;
  b.style.display='flex';
  if(state==='ok') setTimeout(()=>{if(b)b.style.display='none';},2000);
}

// ─── FIREBASE OPS ────────────────────────────────────────────
async function fbLoad(){
  try {
    const [tdR,usR,acR,hiR] = await Promise.all([
      getDoc(doc(db,'app','taskDefs')),
      getDoc(doc(db,'app','users')),
      getDoc(doc(db,'app','activity')),
      getDoc(doc(db,'app','history')),
    ]);
    if(tdR.exists()) taskDefs=tdR.data().data;
    else await setDoc(doc(db,'app','taskDefs'),{data:taskDefs});
    if(usR.exists()) users=usR.data().data;
    else await setDoc(doc(db,'app','users'),{data:users});
    if(acR.exists()) activity=acR.data().data||[];
    if(hiR.exists()) history=hiR.data().data||{};
    // subscribe to checks for today
    subscribeChecks(todayDateKey());
  } catch(e){
    console.error(e);
    setSyncBar('error','Erro ao conectar. Verifique as regras do Firestore.');
  }
}

function subscribeChecks(dateKey){
  if(unsubChecks) unsubChecks();
  unsubChecks = onSnapshot(doc(db,'checks',dateKey),(snap)=>{
    checks[dateKey] = snap.exists() ? snap.data() : {};
    if(cu) renderContent();
  });
}

async function fbSave(docPath, data){
  setSyncBar('loading','Salvando...');
  try{
    const parts=docPath.split('/');
    await setDoc(doc(db,parts[0],parts[1]),data);
    setSyncBar('ok','Salvo');
  }catch(e){setSyncBar('error','Erro ao salvar');}
}

async function saveChecks(dateKey){
  await fbSave(`checks/${dateKey}`, checks[dateKey]||{});
  // update history
  const dayTasks = taskDefs[currentDay]||[];
  const total = dayTasks.length;
  const done = dayTasks.filter(t=>(checks[dateKey]||{})[t.id]?.checked).length;
  history[dateKey]={total,done,date:td(),dayKey:currentDay};
  await fbSave('app/history',{data:history});
}

function drawDonut(canvasId, segments){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const cx=canvas.width/2,cy=canvas.height/2,r=cx-4;
  const total=segments.reduce((a,s)=>a+s.value,0);
  if(total===0){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#f0f0f0';ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    return;
  }
  let start=-Math.PI/2;
  segments.forEach(s=>{
    if(s.value===0)return;
    const angle=(s.value/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+angle);
    ctx.closePath();ctx.fillStyle=s.color;ctx.fill();
    start+=angle;
  });
  ctx.beginPath();ctx.arc(cx,cy,r*0.55,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
}

function renderDashboard(){
  const dateKey=todayDateKey();
  const dayChecks=checks[dateKey]||{};
  const dayTasks=taskDefs[currentDay]||[];
  const total=dayTasks.length, done=dayTasks.filter(t=>dayChecks[t.id]?.checked).length;
  const pct=total===0?0:Math.round((done/total)*100);

  let html=`<div class="dash-pad">`;

  // Metrics
  html+=`<div class="metric-row">
    <div class="metric-card"><div class="metric-label">Concluídas hoje</div><div class="metric-val green">${done}</div></div>
    <div class="metric-card"><div class="metric-label">Pendentes</div><div class="metric-val${total-done>0?' red':''}">${total-done}</div></div>
    <div class="metric-card"><div class="metric-label">Total hoje</div><div class="metric-val">${total}</div></div>
    <div class="metric-card"><div class="metric-label">Conclusão</div><div class="metric-val${pct===100?' green':''}">${pct}%</div></div>
  </div>`;

  // Pizza por perfil (hoje)
  const segments=SO.map(p=>({
    label:PL[p], color:PC[p],
    value:dayTasks.filter(t=>t.profile===p&&dayChecks[t.id]?.checked).length,
    total:dayTasks.filter(t=>t.profile===p).length,
  }));
  html+=`<div class="pizza-card">
    <div class="chart-title">Conclusão por perfil — hoje</div>
    <div class="pizza-wrap">
      <canvas id="pizza-canvas" width="120" height="120" style="flex-shrink:0"></canvas>
      <div class="pizza-legend">`;
  segments.forEach(s=>{
    const p2=s.total===0?0:Math.round((s.value/s.total)*100);
    html+=`<div class="legend-item">
      <div class="legend-dot" style="background:${s.color}"></div>
      <span class="legend-label">${s.label}</span>
      <span class="legend-val">${s.value}<span class="legend-pct">/${s.total}</span></span>
    </div>`;
  });
  html+=`</div></div></div>`;

  // Bar chart por dia da semana (histórico)
  html+=`<div class="bar-chart-card">
    <div class="chart-title">Conclusão por dia da semana</div>`;
  DAYS.forEach((d,i)=>{
    const dayEntries=Object.entries(history).filter(([k,v])=>v.dayKey===d);
    let avg=0;
    if(dayEntries.length>0){
      const sum=dayEntries.reduce((a,[k,v])=>a+(v.total>0?v.done/v.total:0),0);
      avg=Math.round((sum/dayEntries.length)*100);
    }
    const col=DAY_COLORS[i];
    html+=`<div class="bar-row">
      <span class="bar-day">${DAY_LABELS[d]}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${avg}%;background:${col}"><span>${avg>15?avg+'%':''}</span></div>
      </div>
      <span class="bar-pct">${avg}%</span>
    </div>`;
  });
  html+=`</div>`;

  // Comparativo semanal
  const thisWeekKeys=Object.entries(history).filter(([k,v])=>{
    const d=new Date(k+'T12:00:00');
    const now=new Date();
    const startOfWeek=new Date(now);
    startOfWeek.setDate(now.getDate()-now.getDay());
    return d>=startOfWeek;
  });
  const lastWeekKeys=Object.entries(history).filter(([k,v])=>{
    const d=new Date(k+'T12:00:00');
    const now=new Date();
    const startOfThisWeek=new Date(now);
    startOfThisWeek.setDate(now.getDate()-now.getDay());
    const startOfLastWeek=new Date(startOfThisWeek);
    startOfLastWeek.setDate(startOfThisWeek.getDate()-7);
    return d>=startOfLastWeek && d<startOfThisWeek;
  });

  function weekAvg(entries){
    if(entries.length===0)return 0;
    const sum=entries.reduce((a,[k,v])=>a+(v.total>0?v.done/v.total:0),0);
    return Math.round((sum/entries.length)*100);
  }
  const thisAvg=weekAvg(thisWeekKeys), lastAvg=weekAvg(lastWeekKeys);
  const diff=thisAvg-lastAvg;
  const diffCls=diff>0?'up':diff<0?'down':'same';
  const diffIcon=diff>0?'ti-trending-up':diff<0?'ti-trending-down':'ti-minus';

  html+=`<div class="week-compare">
    <div class="chart-title">Comparativo semanal</div>
    <div class="compare-row">
      <div class="compare-card">
        <div class="compare-label">Esta semana</div>
        <div class="compare-val">${thisAvg}%</div>
        <div class="compare-sub">${thisWeekKeys.length} dia(s) registrado(s)</div>
      </div>
      <div class="compare-card">
        <div class="compare-label">Semana anterior</div>
        <div class="compare-val">${lastAvg}%</div>
        <div class="compare-sub">${lastWeekKeys.length} dia(s) registrado(s)</div>
      </div>
    </div>
    <div class="compare-diff ${diffCls}">
      <i class="ti ${diffIcon}"></i>
      ${diff===0?'Igual à semana anterior':Math.abs(diff)+'% '+(diff>0?'acima':'abaixo')+' da semana anterior'}
    </div>
  </div>`;

  // Status por perfil
  html+=`<div class="sec-head" style="margin-bottom:10px"><span class="sec-title">Por perfil — hoje</span></div>`;
  SO.forEach(p=>{
    const pt=dayTasks.filter(t=>t.profile===p), dc=pt.filter(t=>dayChecks[t.id]?.checked).length;
    const pp=pt.length===0?0:Math.round((dc/pt.length)*100), col=PC[p];
    let bCls='badge-part',bTxt=pp+'%';
    if(pp===100){bCls='badge-ok';bTxt='Completo';}else if(pp===0){bCls='badge-pend';bTxt='Pendente';}
    html+=`<div class="prof-stat-card"><div class="ps-head"><div class="ps-icon" style="background:${col}22"><i class="ti ${PI[p]}" style="color:${col}"></i></div><span class="ps-name">${PL[p]}</span><span class="ps-badge ${bCls}">${bTxt}</span></div><div class="ps-track"><div class="ps-fill" style="width:${pp}%;background:${col}"></div></div><div class="ps-count"><span>${dc}</span> de <span>${pt.length}</span> tarefas concluídas</div></div>`;
  });

  if(activity.length>0){
    html+=`<div class="sec-head" style="margin:4px 0 10px"><span class="sec-title">Atividade recente</span></div>`;
    activity.slice(0,8).forEach(a=>{html+=`<div class="act-item"><div class="act-dot" style="background:${a.color}"></div><div class="act-body"><div class="act-text">${a.text}</div><div class="act-meta">${a.date} · ${a.time}</div></div><span class="act-who who-${a.role}">${a.who}</span></div>`;});
  }
  html+=`</div>`;
  document.getElementById('tab-content').innerHTML=html;
  drawDonut('pizza-canvas', segments.map(s=>({color:s.color,value:s.value})));
}

window._toggleTask = async(id)=>{
  const dateKey=todayDateKey();
  if(!checks[dateKey]) checks[dateKey]={};
  const cur=checks[dateKey][id]||{};
  const nowChecked=!cur.checked;
  checks[dateKey][id]={checked:nowChecked,checkedBy:nowChecked?cu.name:null,checkedAt:nowChecked?nt():null};
  renderApp();
  await saveChecks(dateKey);
  if(nowChecked){
    const t=(taskDefs[currentDay]||[]).find(x=>x.id===id);
    if(t) addAct(`Concluiu: "${t.text}"`,cu);
  }
};

window._delTask = async(id)=>{
  if(!confirm('Excluir esta tarefa?'))return;
  taskDefs[currentDay]=(taskDefs[currentDay]||[]).filter(t=>t.id!==id);
  renderApp();
  await fbSave('app/taskDefs',{data:taskDefs});
};

window._confirmAdd = async(p)=>{
  const inp=document.getElementById('fi-'+p),sel=document.getElementById('ft-'+p);
  const text=inp?inp.value.trim():'';if(!text)return;
  const newId=`custom_${Date.now()}`;
  if(!taskDefs[currentDay]) taskDefs[currentDay]=[];
  taskDefs[currentDay].push({id:newId,profile:p,text,tag:sel.value});
  oForm=null; renderApp();
  await fbSave('app/taskDefs',{data:taskDefs});
};

window._resetDay = async()=>{
  if(!confirm('Resetar todos os checks do dia?'))return;
  const dateKey=todayDateKey();
  checks[dateKey]={};
  renderApp();
  await saveChecks(dateKey);
  addAct('Resetou os checks do dia',cu);
};

window._addUser = async()=>{
  const n=document.getElementById('un').value.trim(),p=document.getElementById('up').value,r=document.getElementById('ur').value;
  if(!n||!p){alert('Preencha nome e senha.');return;}
  if(users.find(u=>u.name.toLowerCase()===n.toLowerCase())){alert('Usuário já existe.');return;}
  const newId='u'+Date.now();
  users.push({id:newId,name:n,password:p,role:r,color:RCOL[r]});
  await fbSave('app/users',{data:users});
  addAct(`Cadastrou: ${n} (${RL[r]})`,cu); renderAdmin();
};

window._delUser = async(id)=>{
  const u=users.find(x=>x.id===id);
  if(!u||!confirm(`Remover "${u.name}"?`))return;
  users=users.filter(x=>x.id!==id);
  await fbSave('app/users',{data:users});
  addAct(`Removeu: ${u.name}`,cu); renderAdmin();
};

async function addAct(text,user){
  activity.unshift({text,who:user.name,role:user.role,color:user.color,time:nt(),date:td()});
  if(activity.length>50) activity=activity.slice(0,50);
  await fbSave('app/activity',{data:activity});
}

// ─── INIT ─────────────────────────────────────────────────────
root().innerHTML=`<div class="loading-screen"><div class="spinner"></div><span>Conectando ao servidor...</span></div>`;
fbLoad().then(()=>{
  // wait for first snapshot
  setTimeout(()=>{renderLogin();},800);
});

  }
});
